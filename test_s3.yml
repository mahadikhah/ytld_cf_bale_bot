name: Test S3 Connection (Liara)

on:
  workflow_dispatch:

jobs:
  test-s3:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository (optional)
        uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          sudo apt-get update && sudo apt-get install -y awscli

      - name: Configure AWS CLI for Liara S3
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}          # e.g. https://s3.ir-liara.com
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}                # e.g. default or ir-east-1
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/config << EOF
          [default]
          region = ${S3_REGION}
          output = json
          EOF

          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id = ${S3_ACCESS_KEY}
          aws_secret_access_key = ${S3_SECRET_KEY}
          EOF

          # Set environment variable for endpoint (used in commands)
          echo "S3_ENDPOINT=${S3_ENDPOINT}" >> $GITHUB_ENV

      - name: Test CRUD operations
        env:
          BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          # Create a test file
          echo "Hello from GitHub Actions! Test run at $(date)" > test-file.txt
          echo "✅ Created test file"

          # List buckets (optional)
          echo "📋 Listing buckets..."
          aws s3 ls --endpoint-url $S3_ENDPOINT || echo "⚠️ Unable to list buckets (might need permissions)"

          # Upload
          echo "⬆️ Uploading test file..."
          aws s3 cp test-file.txt s3://${BUCKET_NAME}/test-file.txt --endpoint-url $S3_ENDPOINT
          echo "✅ Uploaded"

          # List objects in bucket
          echo "📋 Listing bucket contents..."
          aws s3 ls s3://${BUCKET_NAME}/ --endpoint-url $S3_ENDPOINT

          # Download
          echo "⬇️ Downloading test file..."
          aws s3 cp s3://${BUCKET_NAME}/test-file.txt downloaded-test.txt --endpoint-url $S3_ENDPOINT
          echo "✅ Downloaded"

          # Verify content
          if diff test-file.txt downloaded-test.txt; then
            echo "✅ File content matches"
          else
            echo "❌ File content mismatch"
            exit 1
          fi

          # Delete
          echo "🗑️ Deleting test file..."
          aws s3 rm s3://${BUCKET_NAME}/test-file.txt --endpoint-url $S3_ENDPOINT
          echo "✅ Deleted"

          echo "🎉 All CRUD operations successful"
