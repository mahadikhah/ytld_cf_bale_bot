name = "bale-yt-bot"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

# Bind KV namespaces – create these in Cloudflare dashboard first
# and set the secrets in repository secrets (will be replaced during deploy)
kv_namespaces = [
  { binding = "BOT_STATE", id = "__BOT_STATE_KV_ID__" },
  { binding = "USER_PLANS", id = "__USER_PLANS_KV_ID__" }
]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1


[triggers]
crons = ["*/3 * * * *"]

[env.production]
vars = { GITHUB_REPO = "mahadikhah/ytld_cf_bale_bot" }

# Optional: routes / custom domain
# routes = [{ pattern = "bot.yourdomain.com", custom_domain = true }]
