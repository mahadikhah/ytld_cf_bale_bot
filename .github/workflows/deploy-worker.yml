name: Deploy Cloudflare Worker

on:
    push:
        branches: [main]
        paths:
            - "worker/**"
    workflow_dispatch: # allow manual trigger

jobs:
    deploy:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./worker

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm install

            - name: Generate wrangler.toml from template
              env:
                BOT_STATE_KV_ID: ${{ secrets.BOT_STATE_KV_ID }}
                USER_PLANS_KV_ID: ${{ secrets.USER_PLANS_KV_ID }}
              run: |
                  sed -i "s/__BOT_STATE_KV_ID__/${BOT_STATE_KV_ID}/g" wrangler.toml
                  sed -i "s/__USER_PLANS_KV_ID__/${USER_PLANS_KV_ID}/g" wrangler.toml
                  echo "Generated wrangler.toml:"
                  cat wrangler.toml

            - name: Set Cloudflare Worker Secrets
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
                  GITHUB_TOKEN: ${{ secrets.ACTION_GITHUB_TOKEN }}
                  GITHUB_REPO: ${{ secrets.ACTION_GITHUB_REPO }}
                  BALE_PAYMENT_TOKEN: ${{ secrets.BALE_PAYMENT_TOKEN }}
                  ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
                  WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
                  ENABLE_S3: ${{ secrets.ENABLE_S3 }}
              run: |
                  echo "$BALE_BOT_TOKEN" | npx wrangler secret put BALE_BOT_TOKEN
                  echo "$GITHUB_TOKEN" | npx wrangler secret put GITHUB_TOKEN
                  echo "$GITHUB_REPO" | npx wrangler secret put GITHUB_REPO
                  echo "$BALE_PAYMENT_TOKEN" | npx wrangler secret put BALE_PAYMENT_TOKEN
                  echo "$ADMIN_CHAT_ID" | npx wrangler secret put ADMIN_CHAT_ID
                  echo "$WORKER_SECRET" | npx wrangler secret put WORKER_SECRET
                  echo "${ENABLE_S3}" | npx wrangler secret put ENABLE_S3

            - name: Deploy to Cloudflare
              id: deploy                        # ← give it an id
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: "worker"
                  command: deploy

            - name: Set Telegram webhook
              env:
                  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
              run: |
                  DEPLOYED_URL="${{ steps.deploy.outputs.deployment-url }}"
                  echo "Deployed worker URL: $DEPLOYED_URL"
                  curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook?url=${DEPLOYED_URL}/telegram/webhook&drop_pending_updates=true"
                  echo "Telegram webhook updated"
