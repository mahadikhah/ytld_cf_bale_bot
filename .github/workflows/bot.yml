name: Bale YouTube Bot Action

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Task to perform'
        required: true
        type: choice
        options:
          - formats
          - download
          - music_search
          - music_download
          - batch_music
      chat_id:
        description: 'Bale chat ID'
        required: true
      video_url:
        description: 'YouTube URL'
        required: false
      format_id:
        description: 'Format ID (for download)'
        required: false
      delivery:
        description: 'Delivery method (bale or s3)'
        required: false
        default: 'bale'
      query:
        description: 'Search query (for music)'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Deno
        id: cache-deno
        uses: actions/cache@v4
        with:
          path: ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('.github/workflows/bot.yml') }}

      # Cache the static ffmpeg binary so we only download it once per workflow change
      - name: Cache ffmpeg binary
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /tmp/ffmpeg-static
          key: ${{ runner.os }}-ffmpeg-${{ hashFiles('.github/workflows/bot.yml') }}

      - name: Install ffmpeg (static build with fallback)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          set -x
          PRIMARY_URL="https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          FALLBACK_URL="https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-linux64-gpl.tar.xz"
          
          download_ffmpeg() {
            local url="$1"
            echo "Downloading ffmpeg from $url"
            curl -sL --retry 2 --connect-timeout 10 --max-time 60 "$url" -o /tmp/ffmpeg.tar.xz
          }
          
          if download_ffmpeg "$PRIMARY_URL"; then
            echo "Primary download succeeded"
          else
            echo "Primary failed, trying fallback..."
            if download_ffmpeg "$FALLBACK_URL"; then
              echo "Fallback succeeded"
            else
              echo "❌ Both ffmpeg download sources failed. The workflow will continue, but audio/video conversion may be unavailable."
              # We'll create a dummy ffmpeg to avoid breaking later steps, but it won't work
              # Better: we'll still allow the job to continue, and unlock the user later
              exit 0  # don't fail the step, just continue
            fi
          fi
          
          # Extract and install
          mkdir -p /tmp/ffmpeg-static
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-static
          BIN_DIR=$(find /tmp/ffmpeg-static -name ffmpeg -type f -print -quit | xargs dirname)
          if [ -d "$BIN_DIR" ]; then
            sudo cp "$BIN_DIR/ffmpeg" /usr/local/bin/
            sudo cp "$BIN_DIR/ffprobe" /usr/local/bin/ 2>/dev/null || true
            echo "ffmpeg installed successfully"
          fi
          rm -f /tmp/ffmpeg.tar.xz

      - name: Restore ffmpeg from cache (if cached)
        if: steps.cache-ffmpeg.outputs.cache-hit == 'true'
        run: |
          BIN_DIR=$(find /tmp/ffmpeg-static -name ffmpeg -type f -print -quit | xargs dirname)
          if [ -d "$BIN_DIR" ]; then
            sudo cp "$BIN_DIR/ffmpeg" /usr/local/bin/
            sudo cp "$BIN_DIR/ffprobe" /usr/local/bin/ 2>/dev/null || true
            echo "ffmpeg restored from cache"
          else
            echo "Cache mis-hit, ffmpeg not found in cache"
          fi

      - name: Install Python dependencies
        run: |
          for i in {1..3}; do
            echo "Attempt $i: pip install yt-dlp requests"
            pip install --timeout 60 --retries 3 yt-dlp requests && break || sleep 5
          done

      - name: Setup Deno (if not cached)
        if: steps.cache-deno.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Add Deno to PATH (if cached)
        if: steps.cache-deno.outputs.cache-hit == 'true'
        run: echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Restore YouTube cookies
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}  
        run: |
          echo "$YOUTUBE_COOKIES_B64" | base64 -d > cookies.txt
          head -n 5 cookies.txt
          if ! grep -q "# Netscape HTTP Cookie File" cookies.txt; then
            echo "::error::cookies.txt is not in Netscape format!"
            exit 1
          fi
          echo "Cookies file looks valid."

      # ---- S3 steps (only when enabled AND delivery is s3) ----
      - name: Install AWS CLI (S3)
        if: env.ENABLE_S3 == 'true' && inputs.action == 'download' && inputs.delivery == 's3'
        run: pip install --quiet awscli

      - name: Quick S3 upload speed test (S3)
        if: env.ENABLE_S3 == 'true' && inputs.action == 'download' && inputs.delivery == 's3'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCOUNT_1_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_1_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_ACCOUNT_1_REGION }}
          S3_ENDPOINT: ${{ secrets.S3_ACCOUNT_1_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_ACCOUNT_1_BUCKET_NAME }}
        run: |
          dd if=/dev/urandom of=test-speed.bin bs=1M count=5 2>/dev/null
          echo "Uploading 5 MB test file…"
          time aws s3 cp test-speed.bin s3://${S3_BUCKET}/test-speed.bin \
            --endpoint-url ${S3_ENDPOINT} --region ${AWS_DEFAULT_REGION} --no-progress
          rm test-speed.bin
          echo "Speed test done"

      - name: Run bot task
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          QUERY: ${{ inputs.query }}
          ACTION: ${{ inputs.action }}
          CHAT_ID: ${{ inputs.chat_id }}
          VIDEO_URL: ${{ inputs.video_url }}
          FORMAT_ID: ${{ inputs.format_id }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          DELIVERY_METHOD: ${{ inputs.delivery }}
          S3_ACCOUNT_1_ENDPOINT: ${{ secrets.S3_ACCOUNT_1_ENDPOINT }}
          S3_ACCOUNT_1_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_1_ACCESS_KEY }}
          S3_ACCOUNT_1_SECRET_KEY: ${{ secrets.S3_ACCOUNT_1_SECRET_KEY }}
          S3_ACCOUNT_1_REGION: ${{ secrets.S3_ACCOUNT_1_REGION }}
          S3_ACCOUNT_1_BUCKET_NAME: ${{ secrets.S3_ACCOUNT_1_BUCKET_NAME }}
          S3_ACCOUNT_2_ENDPOINT: ${{ secrets.S3_ACCOUNT_2_ENDPOINT }}
          S3_ACCOUNT_2_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_2_ACCESS_KEY }}
          S3_ACCOUNT_2_SECRET_KEY: ${{ secrets.S3_ACCOUNT_2_SECRET_KEY }}
          S3_ACCOUNT_2_REGION: ${{ secrets.S3_ACCOUNT_2_REGION }}
          S3_ACCOUNT_2_BUCKET_NAME: ${{ secrets.S3_ACCOUNT_2_BUCKET_NAME }}
          S3_ACCOUNT_3_ENDPOINT: ${{ secrets.S3_ACCOUNT_3_ENDPOINT }}
          S3_ACCOUNT_3_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_3_ACCESS_KEY }}
          S3_ACCOUNT_3_SECRET_KEY: ${{ secrets.S3_ACCOUNT_3_SECRET_KEY }}
          S3_ACCOUNT_3_REGION: ${{ secrets.S3_ACCOUNT_3_REGION }}
          S3_ACCOUNT_3_BUCKET_NAME: ${{ secrets.S3_ACCOUNT_3_BUCKET_NAME }}
          S3_ACCOUNT_4_ENDPOINT: ${{ secrets.S3_ACCOUNT_4_ENDPOINT }}
          S3_ACCOUNT_4_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_4_ACCESS_KEY }}
          S3_ACCOUNT_4_SECRET_KEY: ${{ secrets.S3_ACCOUNT_4_SECRET_KEY }}
          S3_ACCOUNT_4_REGION: ${{ secrets.S3_ACCOUNT_4_REGION }}
          S3_ACCOUNT_4_BUCKET_NAME: ${{ secrets.S3_ACCOUNT_4_BUCKET_NAME }}
          S3_ACCOUNT_5_ENDPOINT: ${{ secrets.S3_ACCOUNT_5_ENDPOINT }}
          S3_ACCOUNT_5_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_5_ACCESS_KEY }}
          S3_ACCOUNT_5_SECRET_KEY: ${{ secrets.S3_ACCOUNT_5_SECRET_KEY }}
          S3_ACCOUNT_5_REGION: ${{ secrets.S3_ACCOUNT_5_REGION }}
          S3_ACCOUNT_5_BUCKET_NAME: ${{ secrets.S3_ACCOUNT_5_BUCKET_NAME }}
        run: python bot_action.py

      - name: Unlock user queue (always)
        if: always()
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          CHAT_ID: ${{ inputs.chat_id }}
        run: |
          curl -s -X POST "$WORKER_URL/github/done" \
            -H "Content-Type: application/json" \
            -d "{\"secret\": \"$WORKER_SECRET\", \"chat_id\": \"$CHAT_ID\"}"
          echo "Queue unlock signal sent"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: |
            bot.log
            yt-dlp.log
            yt-dlp-error.log
            artifacts/
          retention-days: 7
