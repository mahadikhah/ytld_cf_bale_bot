name: Bale YouTube Bot Action

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Task to perform'
        required: true
        type: choice
        options:
          - formats
          - download
      chat_id:
        description: 'Bale chat ID'
        required: true
      video_url:
        description: 'YouTube URL'
        required: true
      format_id:
        description: 'Format ID (for download)'
        required: false
      delivery:
        description: 'Delivery method (bale or s3)'
        required: false
        default: 'bale'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Deno
        id: cache-deno
        uses: actions/cache@v4
        with:
          path: ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('.github/workflows/bot.yml') }}

      - name: Setup Python & dependencies
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            echo "Installing ffmpeg..."
            sudo apt-get install -y ffmpeg
          else
            echo "ffmpeg already installed"
          fi

          for i in {1..3}; do
            echo "Attempt $i: pip install yt-dlp requests"
            pip install --timeout 60 --retries 3 yt-dlp requests && break || sleep 5
          done

      - name: Setup Deno (if not cached)
        if: steps.cache-deno.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Add Deno to PATH (if cached)
        if: steps.cache-deno.outputs.cache-hit == 'true'
        run: echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Restore YouTube cookies
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}  
        run: |
          echo "$YOUTUBE_COOKIES_B64" | base64 -d > cookies.txt
          echo "=== First 5 lines of cookies.txt ==="
          head -n 5 cookies.txt
          if ! grep -q "# Netscape HTTP Cookie File" cookies.txt; then
            echo "::error::cookies.txt is not in Netscape format!"
            exit 1
          fi
          echo "Cookies file looks valid."

      - name: Install AWS CLI
        run: pip install --quiet awscli

      - name: Run bot task
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          ACTION: ${{ inputs.action }}
          CHAT_ID: ${{ inputs.chat_id }}
          VIDEO_URL: ${{ inputs.video_url }}
          FORMAT_ID: ${{ inputs.format_id }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          DELIVERY_METHOD: ${{ inputs.delivery }}
          S3_ACCOUNT_1_ENDPOINT: ${{ secrets.S3_ACCOUNT_1_ENDPOINT }}
          S3_ACCOUNT_1_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_1_ACCESS_KEY }}
          S3_ACCOUNT_1_SECRET_KEY: ${{ secrets.S3_ACCOUNT_1_SECRET_KEY }}
          S3_ACCOUNT_1_REGION: ${{ secrets.S3_ACCOUNT_1_REGION }}
          S3_ACCOUNT_1_BUCKET_NAME: ${{ secrets.S3_ACCOUNT_1_BUCKET_NAME }}
          S3_ACCOUNT_2_ENDPOINT: ${{ secrets.S3_ACCOUNT_2_ENDPOINT }}
          S3_ACCOUNT_2_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_2_ACCESS_KEY }}
          S3_ACCOUNT_2_SECRET_KEY: ${{ secrets.S3_ACCOUNT_2_SECRET_KEY }}
          S3_ACCOUNT_2_REGION: ${{ secrets.S3_ACCOUNT_2_REGION }}
          S3_ACCOUNT_2_BUCKET_NAME: ${{ secrets.S3_ACCOUNT_2_BUCKET_NAME }}
          S3_ACCOUNT_3_ENDPOINT: ${{ secrets.S3_ACCOUNT_3_ENDPOINT }}
          S3_ACCOUNT_3_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_3_ACCESS_KEY }}
          S3_ACCOUNT_3_SECRET_KEY: ${{ secrets.S3_ACCOUNT_3_SECRET_KEY }}
          S3_ACCOUNT_3_REGION: ${{ secrets.S3_ACCOUNT_3_REGION }}
          S3_ACCOUNT_3_BUCKET_NAME: ${{ secrets.S3_ACCOUNT_3_BUCKET_NAME }}
          S3_ACCOUNT_4_ENDPOINT: ${{ secrets.S3_ACCOUNT_4_ENDPOINT }}
          S3_ACCOUNT_4_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_4_ACCESS_KEY }}
          S3_ACCOUNT_4_SECRET_KEY: ${{ secrets.S3_ACCOUNT_4_SECRET_KEY }}
          S3_ACCOUNT_4_REGION: ${{ secrets.S3_ACCOUNT_4_REGION }}
          S3_ACCOUNT_4_BUCKET_NAME: ${{ secrets.S3_ACCOUNT_4_BUCKET_NAME }}
          S3_ACCOUNT_5_ENDPOINT: ${{ secrets.S3_ACCOUNT_5_ENDPOINT }}
          S3_ACCOUNT_5_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_5_ACCESS_KEY }}
          S3_ACCOUNT_5_SECRET_KEY: ${{ secrets.S3_ACCOUNT_5_SECRET_KEY }}
          S3_ACCOUNT_5_REGION: ${{ secrets.S3_ACCOUNT_5_REGION }}
          S3_ACCOUNT_5_BUCKET_NAME: ${{ secrets.S3_ACCOUNT_5_BUCKET_NAME }}
        run: python bot_action.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: |
            bot.log
            yt-dlp.log
            yt-dlp-error.log
            artifacts/
          retention-days: 7
