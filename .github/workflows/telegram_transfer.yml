name: Telegram File Transfer

on:
  workflow_dispatch:
    inputs:
      bale_chat_id:
        description: 'Target Bale chat ID'
        required: true
      file_url:
        description: 'Telegram file URL (optional)'
        required: false
      file_id:
        description: 'Telegram file ID (optional)'
        required: false
      file_name:
        description: 'Original file name'
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve download URL
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -n "${{ inputs.file_id }}" ]; then
            echo "Fetching file URL from Telegram using file_id..."
            RESP=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getFile?file_id=${{ inputs.file_id }}")
            echo "Telegram response: $RESP"
            FILE_PATH=$(echo "$RESP" | jq -r '.result.file_path // empty')
            if [ -z "$FILE_PATH" ]; then
              echo "getFile failed, trying fallback download..."
              # Fallback: construct direct download URL (works for some files)
              FALLBACK_URL="https://api.telegram.org/file/bot${TELEGRAM_BOT_TOKEN}/${{ inputs.file_id }}"
              echo "Attempting direct download: $FALLBACK_URL"
              curl -s -o file.bin "$FALLBACK_URL"
              if [ $? -eq 0 ] && [ -f file.bin ] && [ -s file.bin ]; then
                echo "Fallback download succeeded"
                echo "SKIP_REAL_DOWNLOAD=true" >> $GITHUB_ENV
              else
                echo "Error: Could not download file"
                exit 1
              fi
            else
              FILE_URL="https://api.telegram.org/file/bot${TELEGRAM_BOT_TOKEN}/${FILE_PATH}"
              echo "FILE_URL=$FILE_URL" >> $GITHUB_ENV
            fi
          else
            echo "Using provided file_url: ${{ inputs.file_url }}"
            echo "FILE_URL=${{ inputs.file_url }}" >> $GITHUB_ENV
          fi

      - name: Download file (if not already downloaded via fallback)
        if: env.SKIP_REAL_DOWNLOAD != 'true'
        run: |
          curl -L -o file.bin "$FILE_URL"

      - name: Send to Bale (with split if needed)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.bale_chat_id }}
        run: |
          FILE_SIZE=$(stat -c%s file.bin)
          MAX_SIZE=$((15 * 1024 * 1024))
          SAFE_NAME=$(echo "${{ inputs.file_name }}" | tr -d '\\/*?:"<>|')
          BASE_NAME="${SAFE_NAME%.*}"

          send_message() {
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
                 -H "Content-Type: application/json" \
                 -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"$1\"}"
          }

          if [ "$FILE_SIZE" -le "$MAX_SIZE" ]; then
            echo "File size $(($FILE_SIZE / 1024 / 1024)) MB â€“ sending directly"
            RESPONSE=$(curl -s -w "%{http_code}" -F "document=@file.bin;filename=$SAFE_NAME" \
                       "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -c 4)
            BODY=$(echo "$RESPONSE" | head -c -4)
            if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"ok":true'; then
              send_message "âś… File forwarded from Telegram."
            else
              send_message "âťŚ Failed to send file."
            fi
          else
            send_message "âš ď¸Ź File too large â€“ splitting into parts..."
            zip -s 15m "${BASE_NAME}.zip" file.bin
            PARTS=$(ls "${BASE_NAME}.z"* 2>/dev/null | sort -V)
            for part in $PARTS; do
              RESPONSE=$(curl -s -w "%{http_code}" -F "document=@$part" \
                         "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
              HTTP_CODE=$(echo "$RESPONSE" | tail -c 4)
              BODY=$(echo "$RESPONSE" | head -c -4)
              if [ "$HTTP_CODE" != "200" ] || ! echo "$BODY" | grep -q '"ok":true'; then
                send_message "âťŚ Failed to send part. Aborting."
                exit 1
              fi
              sleep 1
            done
            send_message "âś… Large file forwarded (extract all parts and open the .zip)."
          fi

      - name: Notify failure (if previous steps failed)
        if: failure()
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.bale_chat_id }}
        run: |
          curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
               -H "Content-Type: application/json" \
               -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"âťŚ Failed to process Telegram file transfer.\"}"
