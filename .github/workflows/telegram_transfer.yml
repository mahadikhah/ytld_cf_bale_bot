name: Telegram File Transfer

on:
  workflow_dispatch:
    inputs:
      bale_chat_id:
        description: 'Target Bale chat ID'
        required: true
      file_url:
        description: 'Telegram file URL'
        required: true
      file_name:
        description: 'Original file name'
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download file
        run: curl -L -o file.bin "${{ inputs.file_url }}"

      - name: Send to Bale (with split if needed)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.bale_chat_id }}
        run: |
          FILE_SIZE=$(stat -c%s file.bin)
          MAX_SIZE=$((15 * 1024 * 1024))
          # Use the original file name for the zip archive
          SAFE_NAME=$(echo "${{ inputs.file_name }}" | tr -d '\\/*?:"<>|')
          # Remove extension to get base name for split parts
          BASE_NAME="${SAFE_NAME%.*}"

          send_message() {
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
                 -H "Content-Type: application/json" \
                 -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"$1\"}"
          }

          if [ "$FILE_SIZE" -le "$MAX_SIZE" ]; then
            echo "File size $(($FILE_SIZE / 1024 / 1024)) MB – sending directly"
            RESPONSE=$(curl -s -w "%{http_code}" -F "document=@file.bin;filename=$SAFE_NAME" \
                       "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -c 4)
            BODY=$(echo "$RESPONSE" | head -c -4)
            if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"ok":true'; then
              send_message "✅ File forwarded from Telegram."
            else
              send_message "❌ Failed to send file."
            fi
          else
            send_message "⚠️ File too large – splitting into parts..."
            # Create split zip with the original file name as base
            zip -s 15m "${BASE_NAME}.zip" file.bin
            PARTS=$(ls "${BASE_NAME}.z"* "${BASE_NAME}.zip" 2>/dev/null | sort -V)
            for part in $PARTS; do
              RESPONSE=$(curl -s -w "%{http_code}" -F "document=@$part" \
                         "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
              HTTP_CODE=$(echo "$RESPONSE" | tail -c 4)
              BODY=$(echo "$RESPONSE" | head -c -4)
              if [ "$HTTP_CODE" != "200" ] || ! echo "$BODY" | grep -q '"ok":true'; then
                send_message "❌ Failed to send part. Aborting."
                exit 1
              fi
              sleep 1
            done
            send_message "✅ Large file forwarded (extract all parts and open the .zip)."
          fi
