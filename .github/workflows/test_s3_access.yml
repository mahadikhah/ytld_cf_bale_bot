name: Test S3 Pre-signed URL (ArvanCloud)

on:
  workflow_dispatch:

jobs:
  test-presigned:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Install AWS CLI via pip
        run: pip install --quiet awscli

      - name: Configure AWS CLI
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/config << EOF
          [default]
          region = ${S3_REGION}
          output = json
          EOF
          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id = ${S3_ACCESS_KEY}
          aws_secret_access_key = ${S3_SECRET_KEY}
          EOF
          echo "S3_ENDPOINT=${S3_ENDPOINT}" >> $GITHUB_ENV

      - name: Create test file and upload
        env:
          BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          echo "Test file content – $(date)" > test-file.txt
          aws s3 cp test-file.txt s3://${BUCKET_NAME}/test-file.txt --endpoint-url $S3_ENDPOINT
          echo "✅ Uploaded test file"

      - name: Generate pre-signed URL (2 minutes)
        env:
          BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          PRESIGNED_URL=$(aws s3 presign s3://${BUCKET_NAME}/test-file.txt \
            --endpoint-url $S3_ENDPOINT \
            --expires-in 120)
          echo "=============================================="
          echo "🔗 Pre-signed URL (valid 2 minutes):"
          echo "$PRESIGNED_URL"
          echo "=============================================="
          echo "PRESIGNED_URL=$PRESIGNED_URL" >> $GITHUB_ENV

      - name: Wait for manual test (leave time)
        run: |
          echo "Try the URL above from your browser or curl within the next 2 minutes."
          echo "The workflow will clean up the file automatically when you're done."
          sleep 60   # give you a little time to copy the link

      - name: Clean up test file
        if: always()
        env:
          BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          aws s3 rm s3://${BUCKET_NAME}/test-file.txt --endpoint-url $S3_ENDPOINT
          echo "🗑️ Test file removed"
