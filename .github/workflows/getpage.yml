name: Webpage Download (Full MHTML)

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Bale chat ID'
        required: true
      page_url:
        description: 'Page URL to download'
        required: true
      title:
        description: 'Page title'
        default: 'webpage'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Cache Puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('.github/workflows/getpage.yml') }}

      - name: Setup Node & install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Download page as MHTML
        env:
          PAGE_URL: ${{ inputs.page_url }}
        run: |
          cat > capture.js << 'SCRIPT_END'
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch();
            const page = await browser.newPage();
            const cdp = await page.target().createCDPSession();
            await page.goto(process.env.PAGE_URL, { waitUntil: 'networkidle0', timeout: 30000 });
            const { data } = await cdp.send('Page.captureSnapshot', { format: 'mhtml' });
            require('fs').writeFileSync('page.mhtml', data);
            await browser.close();
          })();
          SCRIPT_END
          node capture.js

      - name: Zip & send (same as before, but only one file)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
          TITLE: ${{ inputs.title }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          # Zip the .mhtml file (optional, but keeps consistent handling)
          zip page.zip page.mhtml
          FILE_SIZE=$(stat -c%s page.zip)
          MAX_SIZE=$((20 * 1024 * 1024))
          SAFE_TITLE=$(echo "$TITLE" | tr -d '\\/*?:"<>|' | cut -c1-45)

          send_message() {
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
                 -H "Content-Type: application/json" \
                 -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"$1\", \"parse_mode\": \"Markdown\"}"
          }

          try_upload() {
            local file="$1"; local caption="$2"
            for attempt in 1 2; do
              if [ -n "$caption" ]; then
                RESPONSE=$(curl -s -w "%{http_code}" -F "document=@$file" -F "caption=$caption" \
                           "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
              else
                RESPONSE=$(curl -s -w "%{http_code}" -F "document=@$file" \
                           "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
              fi
              HTTP_CODE=$(echo "$RESPONSE" | tail -c 4)
              BODY=$(echo "$RESPONSE" | head -c -4)
              if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"ok":true'; then return 0; fi
              [ $attempt -lt 2 ] && sleep 1
            done
            return 1
          }

          if [ "$FILE_SIZE" -le "$MAX_SIZE" ]; then
            echo "Sending MHTML zip (${FILE_SIZE} bytes)"
            if try_upload "page.zip" "$SAFE_TITLE"; then
              echo "Sent"
            else
              send_message "❌ Bale is unstable – unable to send file."
              exit 0
            fi
          else
            send_message "⚠️ The MHTML file is too large even after zipping. Please download it manually: ${{ inputs.page_url }}"
            exit 0
          fi

      - name: Unlock worker queue
        if: always()
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          CHAT_ID: ${{ inputs.chat_id }}
        run: |
          if [ -n "$WORKER_URL" ] && [ -n "$WORKER_SECRET" ]; then
            curl -s -X POST "$WORKER_URL/github/done" \
                 -H "Content-Type: application/json" \
                 -d "{\"secret\": \"$WORKER_SECRET\", \"chat_id\": \"$CHAT_ID\"}"
          fi
