name: Webpage Download (Single HTML)

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Bale chat ID'
        required: true
      page_url:
        description: 'Page URL to download'
        required: true
      title:
        description: 'Page title (for fallback name)'
        default: 'webpage'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install SingleFile CLI
        run: npm install -g single-file-cli


      - name: Capture page as single HTML
        env:
          PAGE_URL: ${{ inputs.page_url }}
        run: |
          echo "Starting single-file capture..."
          single-file "$PAGE_URL" page.html \
            --browser-arg="--no-sandbox" \
            --browser-arg="--disable-setuid-sandbox" \
            --browser-load-max-time=45000 \
            --browser-capture-max-time=45000 \
            --browser-wait-until="networkIdle" \
            --verbose 2>&1 | tee single-file.log

          echo "Capture exit code: $?"
          if [ ! -f page.html ]; then
            echo "page.html not found. Last 20 lines of log:"
            tail -20 single-file.log
            exit 1
          fi
          
      - name: Zip and send
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
          PAGE_URL: ${{ inputs.page_url }}
          TITLE: ${{ inputs.title }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          # Derive safe filename from URL
          RAW_NAME=$(echo "$PAGE_URL" | sed -E 's#^https?://##; s#[^a-zA-Z0-9./_-]#_#g; s#/+#_#g' | tr -s '_' | sed 's/_$//')
          SAFE_NAME=$(echo "$RAW_NAME" | cut -c1-60)
          [ -z "$SAFE_NAME" ] && SAFE_NAME=$(echo "$TITLE" | tr -d '\\/*?:"<>|' | cut -c1-40)
          echo "Safe filename: $SAFE_NAME"

          # Zip the HTML file
          cp page.html "${SAFE_NAME}.html"
          zip -j "${SAFE_NAME}.zip" "${SAFE_NAME}.html"

          ZIP_SIZE=$(stat -c%s "${SAFE_NAME}.zip")
          MAX_SIZE=$((20 * 1024 * 1024))

          send_message() {
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
                 -H "Content-Type: application/json" \
                 -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"$1\", \"parse_mode\": \"Markdown\"}"
          }

          try_upload() {
            local file="$1"; local caption="$2"
            for attempt in 1 2; do
              if [ -n "$caption" ]; then
                RESPONSE=$(curl -s -w "%{http_code}" -F "document=@$file" -F "caption=$caption" \
                           "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
              else
                RESPONSE=$(curl -s -w "%{http_code}" -F "document=@$file" \
                           "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
              fi
              HTTP_CODE=$(echo "$RESPONSE" | tail -c 4)
              BODY=$(echo "$RESPONSE" | head -c -4)
              if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"ok":true'; then
                echo "Upload successful on attempt $attempt"
                return 0
              fi
              [ $attempt -lt 2 ] && sleep 1
            done
            return 1
          }

          if [ "$ZIP_SIZE" -le "$MAX_SIZE" ]; then
            echo "Zip size $(($ZIP_SIZE / 1024 / 1024)) MB – direct send"
            if try_upload "${SAFE_NAME}.zip" "${SAFE_NAME}.zip"; then
              send_message "✅ *Saved webpage:* \`${SAFE_NAME}.zip\`\n\n📱 *How to view:*\n1. Extract the zip.\n2. Open the \`.html\` file with Chrome (or any browser).\n🌐 Works perfectly on mobile!"
            else
              send_message "❌ Bale is currently unstable – unable to send file. Try again later."
              exit 0
            fi
          else
            echo "Zip too large – splitting"
            zip -s 15m "${SAFE_NAME}.zip" "${SAFE_NAME}.html"
            PARTS=$(ls "${SAFE_NAME}.z"* "${SAFE_NAME}.zip" 2>/dev/null | sort -V)
            for part in $PARTS; do
              if ! try_upload "$part"; then
                send_message "❌ Bale interrupted – couldn't send all parts."
                exit 0
              fi
              sleep 1
            done
            send_message "✅ *Saved webpage (split archive).*\n\nExtract all parts, then open the HTML file with your browser."
          fi

      - name: Unlock worker queue
        if: always()
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          CHAT_ID: ${{ inputs.chat_id }}
        run: |
          if [ -n "$WORKER_URL" ] && [ -n "$WORKER_SECRET" ]; then
            curl -s -X POST "$WORKER_URL/github/done" \
                 -H "Content-Type: application/json" \
                 -d "{\"secret\": \"$WORKER_SECRET\", \"chat_id\": \"$CHAT_ID\"}"
          fi
