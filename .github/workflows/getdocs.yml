name: Mirror Documentation Site (SingleFile)

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Bale chat ID'
        required: true
      docs_url:
        description: 'Base URL of the docs'
        required: true
      title:
        description: 'Site name (for zip filename)'
        default: 'docs'

jobs:
  mirror-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Cache Puppeteer
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/puppeteer
            ~/.npm
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('.github/workflows/getdocs.yml') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Setup Node & install dependencies
        run: |
          npm init -y
          npm install puppeteer single-file-cli

      - name: Discover pages and capture (2‑minute limit)
        id: capture
        continue-on-error: true
        env:
          DOCS_URL: ${{ inputs.docs_url }}
          TITLE: ${{ inputs.title }}
        run: |
          mkdir -p output

          cat > capture.js << 'SCRIPT_END'
          const puppeteer = require('puppeteer');
          const { execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');

          const baseUrl = process.env.DOCS_URL;
          const baseOrigin = new URL(baseUrl).origin;
          let basePath = new URL(baseUrl).pathname;
          if (!basePath.endsWith('/')) basePath += '/';

          function safeName(url) {
            return url
              .replace(/^https?:\/\//, '')
              .replace(/[^a-zA-Z0-9\/\-]/g, '_')
              .replace(/\//g, '_')
              .substring(0, 80) + '.html';
          }

          async function collectLinks(page, origin, pathPrefix) {
            return await page.evaluate(({ origin, pathPrefix }) => {
              const anchors = document.querySelectorAll('a[href]');
              const urls = new Set();
              anchors.forEach(a => {
                try {
                  const href = a.href;
                  if (!href || !href.startsWith(origin)) return;
                  const hrefPath = new URL(href).pathname;
                  if (!hrefPath.startsWith(pathPrefix)) return;
                  const clean = href.split('#')[0].replace(/\/$/, '');
                  urls.add(clean);
                } catch(e) {}
              });
              // Add the starting page itself (cleaned)
              urls.add(origin + pathPrefix.replace(/\/$/, ''));
              return Array.from(urls).slice(0, 30);
            }, { origin, pathPrefix });
          }

          async function run() {
            console.log('Launching browser...');
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            try {
              console.log(`Loading base page: ${baseUrl}`);
              await page.goto(baseUrl, { waitUntil: 'networkidle2', timeout: 30000 });

              let links = await collectLinks(page, baseOrigin, basePath);

              // If we got very few links, try the first internal page to get full nav
              if (links.length <= 2) {
                // Find the first link that is NOT the exact base page
                const altLink = links.find(l => l !== baseUrl.replace(/\/$/, ''));
                if (altLink) {
                  console.log(`Too few links – jumping to ${altLink} for navigation`);
                  await page.goto(altLink, { waitUntil: 'networkidle2', timeout: 30000 });
                  links = await collectLinks(page, baseOrigin, basePath);
                }
              }

              console.log(`Found ${links.length} pages under ${basePath}`);
              fs.writeFileSync('urls.txt', links.join('\n'));

              let captured = 0;
              for (const url of links) {
                const filename = safeName(url);
                const outputPath = path.join('output', filename);

                if (fs.existsSync(outputPath)) {
                  console.log(`Skipping: ${filename}`);
                  continue;
                }

                try {
                  console.log(`[${captured+1}/${links.length}] Capturing: ${url}`);
                  execSync(
                    `npx single-file "${url}" "${outputPath}"` +
                    ` --browser-arg="--no-sandbox"` +
                    ` --browser-arg="--disable-setuid-sandbox"` +
                    ` --browser-load-max-time=15000` +
                    ` --browser-capture-max-time=15000` +
                    ` --browser-wait-until="networkIdle"`,
                    { stdio: 'pipe', timeout: 20000 }
                  );
                  captured++;
                  console.log(`  -> saved as ${filename}`);
                } catch(e) {
                  console.error(`  -> failed: ${e.message?.slice(0,100)}`);
                }
              }
            } finally {
              await browser.close();
            }

            const files = fs.readdirSync('output').filter(f => f.endsWith('.html'));
            let indexHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Docs Mirror</title></head><body><h1>Documentation</h1><ul>';
            files.forEach(f => {
              if (f === 'index.html') return;
              indexHtml += `<li><a href="${f}">${f.replace('.html','').replace(/_/g,' ')}</a></li>`;
            });
            indexHtml += '</ul></body></html>';
            fs.writeFileSync('output/index.html', indexHtml);
            console.log(`Written index.html – total pages: ${files.length}`);
          }

          run().catch(e => {
            console.error('Capture script error:', e);
            process.exit(1);
          });
          SCRIPT_END

          timeout 100 node capture.js
          EXIT_CODE=$?
          echo "Capture exited with code $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ] && [ $EXIT_CODE -ne 124 ]; then
            echo "Real failure, but we'll still try to zip anything captured"
          fi

          
      - name: Zip and send to user
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
          DOCS_URL: ${{ inputs.docs_url }}
          TITLE: ${{ inputs.title }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          SAFE_NAME=$(echo "$DOCS_URL" | sed -E 's#^https?://##; s/[^a-zA-Z0-9._-]/_/g; s/__+/_/g' | cut -c1-50)
          [ -z "$SAFE_NAME" ] && SAFE_NAME=$(echo "$TITLE" | tr -d '\\/*?:"<>|' | cut -c1-40)
          ZIP_NAME="${SAFE_NAME}.zip"

          send_message() {
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
                 -H "Content-Type: application/json" \
                 -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"$1\", \"parse_mode\": \"Markdown\"}"
          }

          if [ -d output ] && [ -n "$(ls -A output/*.html 2>/dev/null)" ]; then
            cd output
            zip -r "../${ZIP_NAME}" .
            cd ..

            ZIP_SIZE=$(stat -c%s "$ZIP_NAME")
            MAX_SIZE=$((20 * 1024 * 1024))

            try_upload() {
              local file="$1"; local caption="$2"
              for attempt in 1 2; do
                if [ -n "$caption" ]; then
                  RESPONSE=$(curl -s -w "%{http_code}" -F "document=@$file" -F "caption=$caption" \
                             "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
                else
                  RESPONSE=$(curl -s -w "%{http_code}" -F "document=@$file" \
                             "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
                fi
                HTTP_CODE=$(echo "$RESPONSE" | tail -c 4)
                BODY=$(echo "$RESPONSE" | head -c -4)
                if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"ok":true'; then return 0; fi
                [ $attempt -lt 2 ] && sleep 1
              done
              return 1
            }

            if [ "$ZIP_SIZE" -le "$MAX_SIZE" ]; then
              if try_upload "$ZIP_NAME" "📚 ${SAFE_NAME}"; then
                PAGES=$(unzip -Z1 "$ZIP_NAME" | grep -c '\.html$')
                send_message "✅ *Docs captured:* \`$ZIP_NAME\` ($PAGES pages)\n\n📱 Extract and open \`index.html\` to navigate offline."
              else
                send_message "❌ Bale unstable – upload failed."
              fi
            else
              send_message "⚠️ Archive too large – splitting..."
              rm "$ZIP_NAME"
              cd output
              zip -s 15m "../${ZIP_NAME}" .
              cd ..
              PARTS=$(ls "${SAFE_NAME}.z"* "${SAFE_NAME}.zip" 2>/dev/null | sort -V)
              for part in $PARTS; do
                if ! try_upload "$part"; then
                  send_message "❌ Bale interrupted – could not send all parts."
                  exit 0
                fi
                sleep 1
              done
              send_message "✅ *Docs captured (split archive).* Extract and open \`index.html\`."
            fi
          else
            send_message "❌ No pages were captured. The site might be too heavy or unreachable."
          fi

      - name: Unlock worker queue
        if: always()
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          CHAT_ID: ${{ inputs.chat_id }}
        run: |
          if [ -n "$WORKER_URL" ] && [ -n "$WORKER_SECRET" ]; then
            curl -s -X POST "$WORKER_URL/github/done" \
                 -H "Content-Type: application/json" \
                 -d "{\"secret\": \"$WORKER_SECRET\", \"chat_id\": \"$CHAT_ID\"}"
          fi
