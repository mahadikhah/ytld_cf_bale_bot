name: Test S3 Connection (ArvanCloud)

on:
  workflow_dispatch:

jobs:
  test-s3:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Install AWS CLI via pip
        run: |
          pip install --quiet awscli

      - name: Configure AWS CLI for ArvanCloud S3
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/config << EOF
          [default]
          region = ${S3_REGION}
          output = json
          EOF

          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id = ${S3_ACCESS_KEY}
          aws_secret_access_key = ${S3_SECRET_KEY}
          EOF

          echo "S3_ENDPOINT=${S3_ENDPOINT}" >> $GITHUB_ENV

      - name: Test CRUD operations
        env:
          BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          # Create test file
          echo "Hello from GitHub Actions! Timestamp: $(date)" > test-file.txt
          echo "✅ Created test file"

          # Try to list buckets
          echo "📋 Attempting to list buckets..."
          aws s3 ls --endpoint-url $S3_ENDPOINT || echo "⚠️ Could not list buckets (may be restricted)"

          # Upload
          echo "⬆️ Uploading test file..."
          aws s3 cp test-file.txt s3://${BUCKET_NAME}/test-file.txt --endpoint-url $S3_ENDPOINT
          echo "✅ Uploaded"

          # List bucket contents
          echo "📋 Listing bucket contents..."
          aws s3 ls s3://${BUCKET_NAME}/ --endpoint-url $S3_ENDPOINT

          # Download
          echo "⬇️ Downloading test file..."
          aws s3 cp s3://${BUCKET_NAME}/test-file.txt downloaded-test.txt --endpoint-url $S3_ENDPOINT
          echo "✅ Downloaded"

          # Verify content
          if diff test-file.txt downloaded-test.txt; then
            echo "✅ File content matches"
          else
            echo "❌ File content mismatch"
            exit 1
          fi

          # Delete
          echo "🗑️ Deleting test file..."
          aws s3 rm s3://${BUCKET_NAME}/test-file.txt --endpoint-url $S3_ENDPOINT
          echo "✅ Deleted"

          echo "🎉 All CRUD operations successful!"
