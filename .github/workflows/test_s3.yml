name: Test S3 Connection (ArvanCloud)

on:
  workflow_dispatch:

jobs:
  test-s3:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Install AWS CLI via pip
        run: |
          pip install --quiet awscli

      - name: Configure AWS CLI for ArvanCloud S3
        env:
          S3_ENDPOINT: ${{ secrets.S3_ACCOUNT_2_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCOUNT_2_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_ACCOUNT_2_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_ACCOUNT_2_REGION }}
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/config << EOF
          [default]
          region = ${S3_REGION}
          output = json
          EOF

          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id = ${S3_ACCESS_KEY}
          aws_secret_access_key = ${S3_SECRET_KEY}
          EOF

          echo "S3_ENDPOINT=${S3_ENDPOINT}" >> $GITHUB_ENV

      - name: Test CRUD operations with 10MB file
        env:
          BUCKET_NAME: ${{ secrets.S3_ACCOUNT_2_BUCKET_NAME }}
        run: |
          # Create a 10MB test file (10 * 1024 * 1024 = 10,485,760 bytes)
          echo "📦 Creating 10MB test file..."
          dd if=/dev/zero of=test-file-10mb.txt bs=1M count=10 2>/dev/null
          echo "✅ Created 10MB test file ($(du -h test-file-10mb.txt | cut -f1))"

          # Try to list buckets
          echo "📋 Attempting to list buckets..."
          aws s3 ls --endpoint-url $S3_ENDPOINT || echo "⚠️ Could not list buckets (may be restricted)"

          # Upload with 2-minute timeout
          echo "⬆️ Uploading 10MB test file (timeout: 2 minutes)..."
          
          # Run upload with timeout command
          if timeout 2m aws s3 cp test-file-10mb.txt s3://${BUCKET_NAME}/test-file-10mb.txt --endpoint-url $S3_ENDPOINT; then
            echo "✅ Uploaded successfully"
            UPLOAD_SUCCESS=true
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "⏰ TIMEOUT: Upload operation exceeded 2 minutes limit"
              echo "SPECIAL_MESSAGE: Upload to S3 timed out after 2 minutes - Check network connectivity or increase timeout duration" >> timeout_log.txt
              echo "❌ Upload failed due to timeout"
              UPLOAD_SUCCESS=false
            else
              echo "❌ Upload failed with error code: $EXIT_CODE"
              UPLOAD_SUCCESS=false
            fi
          fi

          # Only proceed with other operations if upload succeeded
          if [ "$UPLOAD_SUCCESS" = true ]; then
            # List bucket contents
            echo "📋 Listing bucket contents..."
            aws s3 ls s3://${BUCKET_NAME}/ --endpoint-url $S3_ENDPOINT

            # Download with 2-minute timeout
            echo "⬇️ Downloading 10MB test file (timeout: 2 minutes)..."
            if timeout 2m aws s3 cp s3://${BUCKET_NAME}/test-file-10mb.txt downloaded-test-10mb.txt --endpoint-url $S3_ENDPOINT; then
              echo "✅ Downloaded successfully"
              
              # Verify content
              if cmp -s test-file-10mb.txt downloaded-test-10mb.txt; then
                echo "✅ File content matches"
              else
                echo "❌ File content mismatch"
                exit 1
              fi
            else
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "⏰ TIMEOUT: Download operation exceeded 2 minutes limit"
                echo "SPECIAL_MESSAGE: Download from S3 timed out after 2 minutes - Check network connectivity or increase timeout duration" >> timeout_log.txt
                echo "❌ Download failed due to timeout"
              else
                echo "❌ Download failed with error code: $EXIT_CODE"
                exit 1
              fi
            fi

            # Delete
            echo "🗑️ Deleting test file..."
            aws s3 rm s3://${BUCKET_NAME}/test-file-10mb.txt --endpoint-url $S3_ENDPOINT
            echo "✅ Deleted"
          fi

          # Display timeout log if it exists
          if [ -f timeout_log.txt ]; then
            echo ""
            echo "========== TIMEOUT LOG =========="
            cat timeout_log.txt
            echo "================================="
            exit 1
          fi

          echo "🎉 All CRUD operations successful!"

      - name: Display timeout message if any
        if: always()
        run: |
          if [ -f timeout_log.txt ]; then
            echo "⚠️ Timeout occurred during the workflow"
            echo "Special message from timeout:"
            cat timeout_log.txt
          fi
